name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Same project as scripts/deploy-prod.sh (song-yang)
      VERCEL_ORG_ID: team_sIqW9hTYZJtDzl28vXdA60G8f
      VERCEL_PROJECT_ID: prj_IQSFko8D6JyEIQy8nCcuAXZCkAYA
    steps:
      - name: Check Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN. Create one at https://vercel.com/account/tokens then add it in GitHub → repo Settings → Secrets and variables → Actions"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret. Add it at GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "::error::Missing VERCEL_ORG_ID secret"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Missing VERCEL_PROJECT_ID secret"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
